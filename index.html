<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#020617">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="V Log Plus">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>V Log Plus — Neuro-Stim Voiding Diary</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; width: 100%; overflow-x: hidden; overflow-y: auto; }
    body { background: #020617; -webkit-tap-highlight-color: transparent; }
    input[type="date"], input[type="time"], input[type="number"] {
      -webkit-appearance: none; appearance: none;
    }
    /* Pulse animation for expired timers */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- CDN Dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Shared module: Storage, constants, utilities (plain JS, no Babel needed) -->
  <script src="shared.js"></script>

  <!-- Service Worker registration with cache-busting and update detection -->
  <script>
  (function() {
    if (!('serviceWorker' in navigator)) return;

    // updateViaCache: 'none' forces the browser to always fetch sw.js from
    // the network, bypassing HTTP cache. This is the single most important
    // fix for stale PWA updates.
    navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
      .then(function(reg) {
        // Check for updates every 60 seconds while app is open
        setInterval(function() { reg.update(); }, 60000);

        // Detect when a new SW is waiting to activate
        function onNewSW() {
          window._swUpdateReady = true;
          window._swRegistration = reg;
          // Dispatch custom event so React can pick it up
          window.dispatchEvent(new Event('sw-update-ready'));
        }

        if (reg.waiting) {
          onNewSW();
        }

        reg.addEventListener('updatefound', function() {
          var newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', function() {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // New version installed and waiting — existing content is served by old SW
              onNewSW();
            }
          });
        });
      })
      .catch(function(err) { console.error('SW registration failed:', err); });

    // When the new SW takes over, reload to get fresh assets
    var refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      if (!refreshing) {
        refreshing = true;
        window.location.reload();
      }
    });
  })();
  </script>

  <!-- Set up React globals so all modules can use them without re-declaring -->
  <script>
  window._React = React;
  window.useState = React.useState;
  window.useEffect = React.useEffect;
  window.useCallback = React.useCallback;
  window.useRef = React.useRef;
  window.useMemo = React.useMemo;
  // Recharts components
  window.RC = Recharts;
  </script>

  <!-- React components and views (JSX, processed by Babel) -->
  <script type="text/babel" src="components.js"></script>
  <script type="text/babel" src="timers.js"></script>
  <script type="text/babel" src="form-view.js"></script>
  <script type="text/babel" src="list-view.js"></script>
  <script type="text/babel" src="stats-view.js"></script>
  <script type="text/babel" src="intake-view.js"></script>
  <script type="text/babel" src="report-view.js"></script>
  <script type="text/babel" src="settings-view.js"></script>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
